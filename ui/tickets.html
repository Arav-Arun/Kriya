<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel — Open Tickets</title>
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<main>
  <h1>Open Tickets</h1>
  <p class="subtitle">Tickets generated by the Sentinel workflow.</p>

  <div class="card">
    <div class="table-container">
      <table>
        <thead><tr><th>Ticket</th><th>Category</th><th>Priority</th><th>Customer</th><th>Assigned Team</th><th>Status</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" hidden>No tickets yet. Run an analysis from the Assistant page.</div>
  </div>

  <div id="detail"></div>
</main>

<script src="/assets/shared.js"></script>
<script>
renderNav('tickets');

async function load() {
  const tickets = await fetchJSON('/api/tickets');
  const rows = document.getElementById('rows');
  document.getElementById('empty').hidden = tickets.length > 0;
  rows.innerHTML = tickets.map((t) => `
    <tr class="clickable" data-id="${esc(t.id)}">
      <td class="mono">${esc(t.id)}</td>
      <td>${esc(t.category)}</td>
      <td>${priorityBadge(t.priority)}</td>
      <td>${t.customer_id ? `${esc(t.customer_name ?? '')} (${t.customer_id})` : '—'}</td>
      <td>${esc(t.assigned_team)}</td>
      <td>${statusBadge(t.status)}</td>
    </tr>`).join('');
  rows.querySelectorAll('tr').forEach((tr) => {
    tr.addEventListener('click', () => showDetail(tr.dataset.id));
  });
}

async function showDetail(id) {
  const t = await fetchJSON(`/api/tickets/${id}`);
  const evidence = t.evidence.split(/\s*•\s*/).filter(Boolean);
  const analysis = typeof t.analysis === 'string' ? JSON.parse(t.analysis) : (t.analysis || null);
  const similar = analysis?.similar_cases?.cases ?? [];
  document.getElementById('detail').innerHTML = `
    <div class="card">
      <h2>${esc(t.id)} — ${esc(t.category)}</h2>
      <dl class="kv">
        <dt>Created</dt><dd>${esc(t.created_at.replace('T', ' ').slice(0, 16))}</dd>
        <dt>Priority</dt><dd>${priorityBadge(t.priority)}</dd>
        <dt>Assigned Team</dt><dd><strong>${esc(t.assigned_team)}</strong></dd>
        <dt>Customer</dt><dd>${t.customer_id ? `${esc(t.customer_name ?? '')} (${t.customer_id})` : '—'}</dd>
        <dt>SLA</dt><dd>${esc(t.sla)}</dd>
        <dt>Policy Reference</dt><dd>${esc(t.policy_reference)}</dd>
        <dt>Similar Cases</dt><dd class="mono">${esc(t.similar_case_ids)}</dd>
      </dl>
      <h2 style="margin-top:16px">Summary</h2>
      <p style="margin:0">${esc(t.summary)}</p>
      <h2 style="margin-top:16px">Original Complaint</h2>
      <p style="margin:0;color:var(--muted)">${esc(t.complaint)}</p>
      <h2 style="margin-top:16px">Evidence</h2>
      <ul class="evidence">${evidence.map((e) => `<li>${esc(e)}</li>`).join('')}</ul>
      ${similar.length ? `
        <h2 style="margin-top:16px">Similar Case Detail</h2>
        ${similar.map((c) => `<p style="margin:6px 0"><span class="badge grey">${esc(c.case_id)}</span>
          ${esc(c.similarity)} <span style="color:var(--muted)">— ${esc(c.resolution)}</span></p>`).join('')}` : ''}
      <h2 style="margin-top:16px">Resolution Recommendation</h2>
      <p style="margin:0">${esc(t.recommendation)}</p>
    </div>`;
  document.getElementById('detail').scrollIntoView({ behavior: 'smooth' });
}

load();
</script>
</body>
</html>
