<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel — Operations Dashboard</title>
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<nav class="dash-nav">
  <div class="brand">Sentinel</div>
  <span class="dash-badge">Internal</span>
  <div class="nav-spacer"></div>
  <a href="/dashboard" class="active">Dashboard</a>
</nav>
<main class="dash-main">
  <h1>Operations Dashboard</h1>
  <p class="subtitle">Live portfolio analytics across the full cardholder base. Every figure is queried from the database in real time.</p>

  <div id="kpis" class="dash-stats">
    <div class="empty">Loading metrics…</div>
  </div>
  <div id="analytics" class="analytics-grid"></div>

  <h2 class="section-h">Exception Queue</h2>
  <p class="subtitle">Rare cases Sentinel cannot resolve directly.</p>
  <div id="stats" class="dash-stats"></div>
  <div id="list" class="dash-list">
    <div class="empty">Loading…</div>
  </div>
  <div id="detail" class="card dash-detail" hidden></div>
</main>
<script src="/assets/shared.js"></script>
<script src="/assets/dashboard.js"></script>
</body>
</html>
