<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sentinel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body class="chat-body">
<header class="chat-header">
  <button class="icon-btn" id="sidebar-toggle" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
  </button>
  <div class="chat-brand">Sentinel</div>
  <nav class="app-tabs" id="app-tabs">
    <button class="active" data-view="chat">Chat</button>
    <button data-view="account">Account</button>
    <button data-view="records">Resolution Records</button>
    <button data-view="escalations">Escalation Tickets</button>
  </nav>
  <div class="chat-user" id="chat-user"></div>
  <button class="ghost chat-end" id="end-session-btn">Sign out</button>
</header>

<div class="chat-layout">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="chat-sidebar">
    <section class="history-panel">
      <div class="history-head">
        <h3>Case History</h3>
        <button class="ghost mini" id="new-chat-btn" type="button">New</button>
      </div>
      <div id="history-list" class="history-list">
        <div class="sidebar-loading">Loading…</div>
      </div>
    </section>

    <h3>Account Snapshot</h3>
    <div id="sidebar-content" class="sidebar-content">
      <div class="sidebar-loading">Loading…</div>
    </div>
  </aside>

  <div class="chat-main" id="view-chat">
    <div class="chat-messages" id="messages">
      <div class="chat-welcome" id="welcome">
        <h2 id="welcome-title">Hi.</h2>
        <p>Tell me what's wrong with your card or your bill — I'll check your account and fix what I can, right here in the chat.</p>
        <div class="suggestion-chips" id="suggestions">
          <button class="chip">Waive my late fee</button>
          <button class="chip">I see a charge I don't recognize</button>
          <button class="chip">Block my card</button>
          <button class="chip">Convert a purchase to EMI</button>
          <button class="chip">What's the status of my dispute?</button>
          <button class="chip">Cancel a subscription on autopay</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div id="upload-status" class="upload-status" hidden></div>
      <div class="chat-input-wrap">
        <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp,application/pdf,text/csv,text/plain,.pdf,.csv,.txt" hidden>
        <button class="upload-btn" id="upload-btn" type="button" title="Upload a statement or screenshot" aria-label="Upload a statement or screenshot">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 1 1 5.66 5.66L9.64 17.2a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="msg-input" placeholder="Describe the issue…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="panel-main" id="view-panel" hidden>
    <div id="panel-content" class="panel-content">
      <div class="sidebar-loading">Loading…</div>
    </div>
  </div>
</div>

<script type="module" src="/assets/chat.js"></script>
</body>
</html>
