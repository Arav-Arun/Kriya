<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kriya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/shared/app.css">
</head>
<body class="chat-body">
<div id="login-overlay" class="login-overlay" hidden>
  <div class="login-shell">
    <a href="/" class="login-brand">
      <img src="/assets/kriya-logo.png" width="28" height="28" alt="Kriya" class="brand-logo">
      Kriya
    </a>
    <h1>Sign in to Kriya</h1>
    <p>Enter the mobile number registered with your card and we'll load your real account. No demo data.</p>
    <form id="login-form" autocomplete="off" novalidate>
      <input id="login-phone" type="tel" inputmode="numeric" placeholder="Registered mobile number"
             maxlength="16" autocomplete="tel" aria-label="Registered mobile number">
      <button type="submit" class="login-btn" id="login-submit">Continue</button>
    </form>
    <div id="login-error" class="login-error" hidden></div>
    <button type="button" class="login-demo" id="login-demo" hidden></button>
  </div>
</div>
<header class="chat-header">
  <button class="icon-btn" id="sidebar-toggle" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
  </button>
  <a href="/" class="chat-brand"><img src="/assets/kriya-logo.png" width="26" height="26" alt="" class="brand-logo">Kriya</a>
  <div class="chat-user" id="chat-user"></div>
  <button class="ghost chat-end" id="end-session-btn">Sign out</button>
</header>

<div class="chat-layout">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="chat-sidebar">
    <section class="history-panel">
      <div class="history-head">
        <h3>Case History</h3>
        <button class="ghost mini" id="new-chat-btn" type="button">New</button>
      </div>
      <div id="history-list" class="history-list">
        <div class="sidebar-loading">Loading…</div>
      </div>
    </section>
  </aside>

  <div class="chat-main" id="view-chat">
    <div class="chat-messages" id="messages">
      <div class="chat-welcome" id="welcome">
        <h2 id="welcome-title">Hi.</h2>
        <p>Tell me what's wrong with your card or your bill. I'll check your account and fix what I can, right here in the chat.</p>
        <div class="suggestion-chips" id="suggestions"></div>
      </div>
    </div>

    <div class="chat-input-area">
      <div id="upload-status" class="upload-status" hidden></div>
      <div id="voice-status" class="voice-status" hidden></div>
      <div class="chat-input-wrap">
        <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp,application/pdf,text/csv,text/plain,.pdf,.csv,.txt" hidden>
        <button class="upload-btn" id="upload-btn" type="button" title="Upload a statement or screenshot" aria-label="Upload a statement or screenshot">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 1 1 5.66 5.66L9.64 17.2a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea id="msg-input" placeholder="Describe the issue…" rows="1"></textarea>
        <button class="mic-btn" id="mic-btn" type="button" title="Speak to Kriya" aria-label="Speak to Kriya" hidden>
          <svg class="mic-ic" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg>
          <svg class="stop-ic" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
        <button class="send-btn" id="send-btn" disabled aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script type="module" src="/assets/portal/chat.js"></script>
</body>
</html>
